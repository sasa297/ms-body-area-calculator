<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fabrication Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Section 1: User Input -->
  <section id="input" class="block">
    <h2>Section 1: User Input</h2>
    <form id="calcForm">
      <label>Project Name <input type="text" id="projectName"></label>
      <label>Customer Name <input type="text" id="customerName"></label>
      <label>Length (mm) <input type="number" id="length"></label>
      <label>Width (mm) <input type="number" id="width"></label>
      <label>Height (mm) <input type="number" id="height"></label>
      <label>Thickness (mm) <input type="number" id="thickness"></label>
      <label>Type of Panel
        <select id="panelType">
          <option value="single">Single Door</option>
          <option value="twin">Twin Door</option>
          <option value="double">Double Door</option>
        </select>
      </label>
      <button type="button" onclick="calculate()">Calculate</button>
    </form>
  </section>

  <!-- Section 2: Results -->
  <section id="results" class="block">
    <h2>Section 2: Results</h2>
    <p id="output">Enter values and click Calculate.</p>
  </section>

  <!-- Section 3: Description -->
  <section id="description" class="block">
    <h2>Section 3: Detailed Description</h2>
    <p>
      This tool estimates fabrication area and weight based on dimensions and material thickness.
      Extend this section with tables, diagrams, or cost breakdowns to match your workflow.
    </p>
  </section>

  <script>
    function calculate() {
      const length = parseFloat(document.getElementById('length').value);
      const width = parseFloat(document.getElementById('width').value);
      const height = parseFloat(document.getElementById('height').value);
      const thickness = parseFloat(document.getElementById('thickness').value);

      if (isNaN(length) || isNaN(width) || isNaN(height) || isNaN(thickness)) {
        document.getElementById('output').innerText = "⚠️ Please enter all values.";
        return;
      }

      const area = 2 * (length*width + length*height + width*height) / 92903.04;
      const weight = area * thickness * 7.85;

      document.getElementById('output').innerText =
        `Project: ${document.getElementById('projectName').value}\n` +
        `Customer: ${document.getElementById('customerName').value}\n` +
        `Total Area: ${area.toFixed(2)} sq.ft\n` +
        `Estimated Weight: ${weight.toFixed(2)} kg`;
    }
  </script>
</body>
</html>
