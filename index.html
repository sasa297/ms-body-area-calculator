<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MS Calculator</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="page">

    <!-- BLOCK 1: INPUTS -->
    <section class="block block-inputs">

      <div class="inputs-left">
        <h3>Project Details</h3>

        <label>Project Name</label>
        <input type="text" placeholder="Enter project name"/>

        <label>Customer Name</label>
        <input type="text" placeholder="Enter customer name"/>
      </div>

      <div class="inputs-right">
        <h3>Dimensions</h3>

        <label>Item 1</label>
        <input type="text" placeholder="L × W × H (mm)"/>
        <input type="number" placeholder="Thickness (mm)"/>

        <label>Item 2</label>
        <input type="text" placeholder="L × W × H (mm)"/>
        <input type="number" placeholder="Thickness (mm)"/>
      </div>

    </section>

    <!-- BLOCK 2 (placeholder for now) -->
    <section class="block block-results">
      <h3>Results</h3>
    </section>

    <!-- BLOCK 3 (placeholder for now) -->
    <section class="block block-summary">
      <h3>Summary</h3>
    </section>

  </div>

</body>
</html>
