<section class="card" id="block1">
  <h2>User Input</h2>
  <form id="calcForm">
    <div class="two-col-grid">

      <!-- First Column -->
      <div class="col">
        <label>Project Name
          <input type="text" id="projectName">
        </label>
        <label>Customer Name
          <input type="text" id="customerName">
        </label>
      </div>

      <!-- Second Column -->
      <div class="col">
        <!-- Line 1 -->
        <div class="inline-inputs">
          <input type="number" id="length" placeholder="Length">
          <span>×</span>
          <input type="number" id="width" placeholder="Width">
          <span>×</span>
          <input type="number" id="height" placeholder="Height">
          <span>mm thick</span>
          <input type="number" id="thickness1" placeholder="Thickness">
        </div>

        <!-- Line 2 -->
        <div class="inline-inputs">
          <input type="number" id="width2" placeholder="Width">
          <span>×</span>
          <input type="number" id="height2" placeholder="Height">
          <span>mm thick</span>
          <input type="number" id="thickness2" placeholder="Thickness">
        </div>
      </div>

    </div>
    <button type="button" onclick="calculate()">Calculate</button>
  </form>
</section>
