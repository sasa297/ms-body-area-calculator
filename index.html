<section class="card" id="block1">
  <h2>User Input</h2>
  <form id="calcForm">
    <div class="two-col-grid">

      <!-- Column 1: Project & Customer -->
      <div class="col">
        <label>Project Name
          <input type="text" id="projectName" placeholder="Enter project name">
        </label>
        <label>Customer Name
          <input type="text" id="customerName" placeholder="Enter customer name">
        </label>
      </div>

      <!-- Column 2: Dimensions -->
      <div class="col">
        <!-- Line 1 -->
        <div class="inline-inputs">
          <input type="number" id="dim1a" placeholder="1000">
          <span>×</span>
          <input type="number" id="dim1b" placeholder="1000">
          <span>×</span>
          <input type="number" id="dim1c" placeholder="1000">
          <span>mm thick</span>
          <input type="number" id="thick1" placeholder="1.2">
        </div>

        <!-- Line 2 -->
        <div class="inline-inputs">
          <input type="number" id="dim2a" placeholder="1000">
          <span>×</span>
          <input type="number" id="dim2b" placeholder="1000">
          <span>mm thick</span>
          <input type="number" id="thick2" placeholder="1.5">
        </div>
      </div>

    </div>
    <button type="button" onclick="calculate()">Calculate</button>
  </form>
</section>
